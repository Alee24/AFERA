version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: afera_db
    restart: always
    environment:
      MYSQL_DATABASE: afera_sms
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: afera_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_NAME=afera_sms
      - DB_USER=root
      - DB_PASSWORD=root_password
      - JWT_SECRET=your_super_secret_key_change_me
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: afera_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=/api
    depends_on:
      - backend

volumes:
  db_data:
