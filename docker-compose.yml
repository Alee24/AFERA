version: '3.8'

services:
  db:
    image: mysql:5.7
    container_name: afera_db
    restart: always
    command: --innodb-buffer-pool-size=64M --max-connections=50
    environment:
      MYSQL_DATABASE: afera_sms
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: afera_backend
    restart: always
    ports:
      - "5455:5000"
    environment:
      - DB_HOST=db
      - DB_NAME=afera_sms
      - DB_USER=root
      - DB_PASSWORD=root_password
      - JWT_SECRET=your_super_secret_key_change_me
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: afera_frontend
    restart: always
    ports:
      - "5454:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://aferainnov.africa/api
    depends_on:
      - backend

  certbot:
    image: certbot/certbot
    container_name: afera_certbot
    volumes:
      - certbot_etc:/etc/letsencrypt
      - certbot_var:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"

volumes:
  db_data:
  certbot_etc:
  certbot_var:
