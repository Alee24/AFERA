version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: afera_db
    restart: always
    environment:
      MYSQL_DATABASE: afera_sms
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: afera_backend
    restart: always
    environment:
      - DB_HOST=db
      - DB_NAME=afera_sms
      - DB_USER=root
      - DB_PASSWORD=root_password
      - JWT_SECRET=your_super_secret_key_change_me
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: afera_frontend
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=/api
    depends_on:
      - backend

  proxy:
    image: nginx:alpine
    container_name: afera_proxy
    restart: always
    ports:
      - "5454:80"
      - "5455:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_etc:/etc/letsencrypt
      - certbot_var:/var/www/certbot
    depends_on:
      - frontend
      - backend

  certbot:
    image: certbot/certbot
    container_name: afera_certbot
    volumes:
      - certbot_etc:/etc/letsencrypt
      - certbot_var:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"

volumes:
  db_data:
  certbot_etc:
  certbot_var:
